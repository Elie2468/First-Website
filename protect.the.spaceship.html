<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge the Blocks</title>

<style>
    body {
        margin: 0;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        color: #fff;
    }

    #gameContainer {
        position: relative;
    }

    canvas {
        background: #111;
        border: 2px solid #fff;
        display: block;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
    }

    #restartBtn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 12px 24px;
        font-size: 20px;
        background: lime;
        border: none;
        cursor: pointer;
        display: none;
    }
</style>
</head>

<body>

<div id="gameContainer">
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button id="restartBtn">Restart</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restartBtn');

let player, blocks, blockSpeed, spawnRate, score, frameCount, additionalBlocks, gameOver;

// Initialize game
function initGame() {
    player = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 50,
        width: 40,
        height: 40,
        speed: 7
    };

    blocks = [];
    blockSpeed = 3;
    spawnRate = 90;
    score = 0;
    frameCount = 0;
    additionalBlocks = 0;
    gameOver = false;

    restartBtn.style.display = "none";
}

// Controls
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

// ✅ FIXED Spawn blocks with guaranteed gap
function spawnBlock() {
    const totalBlocks = 1 + additionalBlocks;

    // Always leave a safe gap wider than the player
    const gapSize = player.width + 20;
    const gapX = Math.random() * (canvas.width - gapSize);

    for (let i = 0; i < totalBlocks; i++) {
        const size = 30 + Math.random() * 20;

        let x;
        let attempts = 0;

        // Try to place block outside the gap
        do {
            x = Math.random() * (canvas.width - size);
            attempts++;
        } while (
            x < gapX + gapSize &&
            x + size > gapX &&
            attempts < 20
        );

        blocks.push({
            x,
            y: -size,
            width: size,
            height: size
        });
    }
}

// Update
function update() {
    if (gameOver) return;

    frameCount++;

    if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
    if (keys['ArrowRight'] && player.x + player.width < canvas.width) player.x += player.speed;

    if (frameCount % spawnRate === 0) spawnBlock();

    for (let i = blocks.length - 1; i >= 0; i--) {
        blocks[i].y += blockSpeed;

        // Collision
        if (
            player.x < blocks[i].x + blocks[i].width &&
            player.x + player.width > blocks[i].x &&
            player.y < blocks[i].y + blocks[i].height &&
            player.y + player.height > blocks[i].y
        ) {
            gameOver = true;
            restartBtn.style.display = "block";
        }

        if (blocks[i].y > canvas.height) {
            blocks.splice(i, 1);
            score++;

            if (score % 10 === 0) {
                additionalBlocks++;
                blockSpeed += 0.5;
            }
        }
    }
}

// Draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'lime';
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = 'red';
    blocks.forEach(block => ctx.fillRect(block.x, block.y, block.width, block.height));

    document.getElementById('score').textContent = `Score: ${score}`;

    if (gameOver) {
        ctx.fillStyle = 'white';
        ctx.font = '30px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 50);
    }
}

// Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Restart
restartBtn.addEventListener('click', () => {
    initGame();
});

// Start
initGame();
gameLoop();
</script>

</body>
</html>
