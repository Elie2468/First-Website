<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge the Blocks</title>
<style>
    body {
        margin: 0;
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        color: #fff;
    }

    canvas {
        background: #111;
        display: block;
        border: 2px solid #fff;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
    }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const player = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 50,
        width: 40,
        height: 40,
        speed: 7
    };

    let blocks = [];
    let blockSpeed = 3;
    let spawnRate = 90; // frames
    let score = 0;
    let frameCount = 0;
    let additionalBlocks = 0; // number of extra blocks per spawn

    // Key controls
    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    function spawnBlock() {
        const totalBlocks = 1 + additionalBlocks; // base block + extra
        for (let i = 0; i < totalBlocks; i++) {
            const size = 30 + Math.random() * 20;
            const x = Math.random() * (canvas.width - size);
            blocks.push({ x, y: -size, width: size, height: size });
        }
    }

    function update() {
        frameCount++;

        // Move player
        if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x + player.width < canvas.width) player.x += player.speed;

        // Spawn blocks
        if (frameCount % spawnRate === 0) spawnBlock();

        // Move blocks
        for (let i = blocks.length - 1; i >= 0; i--) {
            blocks[i].y += blockSpeed;

            // Collision detection
            if (
                player.x < blocks[i].x + blocks[i].width &&
                player.x + player.width > blocks[i].x &&
                player.y < blocks[i].y + blocks[i].height &&
                player.y + player.height > blocks[i].y
            ) {
                alert(`Game Over! Your score: ${score}`);
                document.location.reload();
            }

            // Remove blocks off-screen
            if (blocks[i].y > canvas.height) {
                blocks.splice(i, 1);
                score++;

                // Increase difficulty every 10 points
                if (score % 10 === 0) {
                    additionalBlocks++;      // Add extra block
                    blockSpeed += 0.5;       // Make blocks faster slightly
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw player
        ctx.fillStyle = 'lime';
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Draw blocks
        ctx.fillStyle = 'red';
        blocks.forEach(block => ctx.fillRect(block.x, block.y, block.width, block.height));

        // Draw score
        document.getElementById('score').textContent = `Score: ${score}`;
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
